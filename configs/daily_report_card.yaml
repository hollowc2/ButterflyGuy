# Daily Report Card — post-market Discord summary for margin account.
# Webhook: DISCORD_DAILY_REPORT_CARD_WEBHOOK in .env
# Cron: infra/cron/daily_report_card.cron (weekdays 6:00 PM Eastern / 22:00 UTC)

thresholds:
  large_loss_day_pct: 2.0       # flag if day down more than this % of start balance
  large_single_loss: 200.0      # flag worst trade below -$N
  low_buying_power: 500.0       # flag if buying power below $N
  top_trades_count: 3           # winners/losers to show

report_dir: reports/daily_report_card
