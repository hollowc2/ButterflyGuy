# Morning equity scan — separate from butterfly options trading.
# Uses Butterfly Guy Schwab auth (tokens.json + .env credentials).
# Discord: set EQUITY_DISCORD_WEBHOOK_URL in .env (not DISCORD_WEBHOOK_URL).
# Cron: weekdays 6:00 AM Pacific — see infra/cron/equity_morning_scan.cron
# (Vixie cron uses UTC; wrapper tools/run_morning_scan_cron.sh handles DST)
# Universe refresh: Sundays 8:00 PM Pacific — refresh_equity_universes.py
#   (sp500/nq100 from public sources; liquid from NASDAQ/NYSE seeds + Schwab
#   price/volume validation). Expect ~10–20 min for liquid rebuild; morning scan
#   with liquid enabled scans ~2k symbols vs ~600 without it.

universes:
  - sp500
  - nq100
  - liquid
  - custom

universe_dir: configs/universes
custom_watchlist: configs/universes/custom.txt

filters:
  min_price: 10.0
  min_volume: 500000
  prior_day_min_pct: 3.0
  premarket_min_gap_pct: 2.0
  min_rvol: 0.05
  max_abs_pct: 50.0
  max_price_disagreement_pct: 5.0
  max_reference_price_deviation_pct: 75.0
  require_index_membership: true

rvol_lookback_days: 20
rvol_fetch_concurrency: 4
group_by_sector: true

limits:
  prior_gainers: 15
  prior_losers: 15
  premarket_gainers: 15
  premarket_losers: 15
  opening_focus: 12
  catalyst_watch: 12
  movers_per_bucket: 10

news:
  enabled: true
  providers:
    - sec
    - alpha_vantage
  recent_days: 3
  upcoming_days: 5
  max_symbols: 80
  min_score_for_focus: 4.0
  request_timeout_seconds: 10.0
  sec_user_agent_env: SEC_USER_AGENT
  alpha_vantage_api_key_env: ALPHA_VANTAGE_API_KEY
  alpha_vantage_max_news_symbols: 20
  alpha_vantage_news_limit: 20

batch_size: 150
premarket_start_et: "04:00"
dedupe_premarket_with_prior: true
gap_overlap_tolerance_pct: 0.5
report_dir: reports/equity_scans

context_symbols:
  - $SPX
  - $COMPX
  - $DJI
  - SPY
  - QQQ
