schwab:
  token_path: "tokens.json"
  max_token_age: 518400  # 6 days in seconds

strategy:
  underlying: "NDX"
  wing_widths: [25, 50, 75]   # NDX strikes are wider
  spot_range: 250              # NDX trades ~20000, wider scan range
  rr_min: 8.0
  max_cost_per_width:
    25: 2.00
    50: 4.00
    75: 6.00
entry:
  start_time: "07:00"  # PST
  end_time: "07:45"    # PST
  timezone: "America/Los_Angeles"
  strike_selection_method: "VIX"
  center_tolerance: 100.0  # NDX moves in larger point increments
execution:
  price_ladder_step: 0.10
  price_ladder_steps: 4
  retry_interval_seconds: 20
  order_timeout_seconds: 300
  paper_trading: true
  paper_fill_buffer: 0.00
profit_management:
  regimes:
    morning:
      start_minutes_after_open: 0
      end_minutes_after_open: 120
      drawdown_threshold: 1.00
      confirmation_polls: 3
      min_peak_profit_ratio: 1.5
    late_morning:
      start_minutes_after_open: 120
      end_minutes_after_open: 240
      drawdown_threshold: 0.95
      confirmation_polls: 2
      min_peak_profit_ratio: 1.5
    afternoon:
      start_minutes_after_open: 240
      end_minutes_after_open: 390
      drawdown_threshold: 0.90
      confirmation_polls: 2
      min_peak_profit_ratio: 1.5
  exit_before_close_minutes: 0
  max_loss_from_cost: 0.50
  use_absolute_loss_stop: false
  quote_quality:
    enabled: true
    min_bid_to_mark_ratio: 0.35
    max_spread_width_ratio: 1.5
risk:
  max_daily_loss: 500.0
  max_trades_per_day: 1
  max_position_size: 1
collector:
  snapshot_interval_seconds: 60
monitoring:
  metrics_port: 8000           # each container gets its own port 8000 internally
  log_level: "INFO"
