schwab:
  token_path: "tokens.json"
  max_token_age: 518400  # 6 days in seconds

strategy:
  underlying: "XSP"
  wing_widths: [1, 2, 3]
  spot_range: 10
  rr_min: 8.0
  max_cost_per_width:
    1: 0.10
    2: 0.20
    3: 0.30
entry:
  start_time: "07:00"  # PST
  end_time: "07:45"    # PST
  timezone: "America/Los_Angeles"
  strike_selection_method: "VIX"   # anchor center to VIX-implied expected move per width
  center_tolerance: 1.5  # pts; candidate center must be within this of VIX target (1/10th of SPX)
execution:
  price_ladder_step: 0.01  # 1/10th of SPX step
  price_ladder_steps: 4
  retry_interval_seconds: 20
  order_timeout_seconds: 300
  paper_trading: true
  paper_fill_buffer: 0.00
profit_management:
  regimes:
    morning:
      start_minutes_after_open: 0
      end_minutes_after_open: 120
      drawdown_threshold: 0.60
      confirmation_polls: 1
      min_peak_profit_ratio: 1.0
    late_morning:
      start_minutes_after_open: 120
      end_minutes_after_open: 240
      drawdown_threshold: 0.90
      confirmation_polls: 1
      min_peak_profit_ratio: 1.0
    afternoon:
      start_minutes_after_open: 240
      end_minutes_after_open: 390
      drawdown_threshold: 0.75
      confirmation_polls: 1
      min_peak_profit_ratio: 1.0
  exit_before_close_minutes: 0
  max_loss_from_cost: 0.50
  use_absolute_loss_stop: false
  quote_quality:
    enabled: false
    min_bid_to_mark_ratio: 0.0
    max_spread_width_ratio: null
risk:
  max_daily_loss: 50.0        # 1/10th of SPX; raw credit units (not dollar-multiplied)
  max_trades_per_day: 1
  max_position_size: 1
  max_weekly_loss: 150.0      # 3x daily; halt for the day if rolling 7-day losses hit this
  max_consecutive_losses: 10  # halt after 10 consecutive losing trades (across any days)
  min_account_value: 25500.0  # PDT floor ($25k) + $500 buffer; block entry if account drops below
  min_buying_power: 200.0     # minimum buying power required before entering a trade
  fail_safe_on_balance_error: true  # block trading if Schwab balance API is unavailable
collector:
  snapshot_interval_seconds: 60
monitoring:
  metrics_port: 8000
  log_level: "INFO"
