schwab:
  token_path: "tokens.json"
  max_token_age: 518400  # 6 days in seconds

strategy:
  underlying: "XSP"
  # XSP is managed independently from SPX parity. Wider flies and a real
  # debit floor avoid penny-noise trades where a few cents dominate behavior.
  wing_widths: [3, 4, 5]
  vix_width_buckets:
    - vix_max: 17.0
      widths: [3, 4]
    - vix_max: 24.5
      widths: [3, 4, 5]
    - vix_max: 32.0
      widths: [4, 5]
    - vix_max: 9999.0
      widths: [4, 5]
  spot_range: 10
  min_debit: 0.25
  rr_min: 8.0
  max_cost_per_width:
    3: 0.30
    4: 0.40
    5: 0.50
entry:
  start_time: "07:00"  # PST
  end_time: "07:45"    # PST
  timezone: "America/Los_Angeles"
  strike_selection_method: "VIX"   # anchor center to VIX-implied expected move per width
  center_tolerance: 1.5  # pts; candidate center must be within this of VIX target (1/10th of SPX)
execution:
  price_ladder_step: 0.01  # 1/10th of SPX step
  price_ladder_steps: 4
  retry_interval_seconds: 20
  order_timeout_seconds: 300
  paper_trading: false
  allow_live_trading: true
  paper_fill_buffer: 0.00
  paper_slippage_per_spread: 0.005  # 1/10th of SPX paper slippage
profit_management:
  strategy: "peakvaluetrailer"
  profitprotector:
    breakeven_activation_profit: 1.00
    breakeven_floor_profit: 0.00
    profit_lock_activation_profit: 2.00
    profit_lock_floor_profit: 0.75
    large_peak_profit_ratio: 2.00
    large_peak_drawdown_threshold: 0.50
  regimes:
    morning:
      start_minutes_after_open: 0
      end_minutes_after_open: 120
      drawdown_threshold: 0.80
      confirmation_polls: 3
      min_peak_profit_ratio: 1.25
      min_hold_minutes: 30
    late_morning:
      start_minutes_after_open: 120
      end_minutes_after_open: 240
      drawdown_threshold: 0.90
      confirmation_polls: 3
      min_peak_profit_ratio: 1.25
      min_hold_minutes: 45
    afternoon:
      start_minutes_after_open: 240
      end_minutes_after_open: 390
      drawdown_threshold: 0.85
      confirmation_polls: 3
      min_peak_profit_ratio: 1.25
      min_hold_minutes: 45
  exit_before_close_minutes: 0
  max_loss_from_cost: 0.50
  use_absolute_loss_stop: false
  quote_quality:
    enabled: true
    min_bid_to_mark_ratio: 0.75
    max_spread_width_ratio: 0.50
    min_mark_value: 0.25
    max_leg_spread_to_mark_ratio: 1.00
    max_leg_spread_abs: 0.20
  peak_tracking:
    confirmation_polls: 3
    confirmation_tolerance_ratio: 0.10
    require_quote_quality: true
    max_jump_ratio: 0.50
    max_jump_abs: 0.10
risk:
  max_daily_loss: 50.0        # 1/10th of SPX; raw credit units (not dollar-multiplied)
  max_trades_per_day: 1
  max_position_size: 1
  max_weekly_loss: 150.0      # 3x daily; halt for the day if rolling 7-day losses hit this
  max_consecutive_losses: 10  # warn after 10 consecutive losing trades (across any days)
  min_buying_power: 200.0     # minimum buying power required before entering a trade
  fail_safe_on_balance_error: true  # block trading if Schwab balance API is unavailable
collector:
  snapshot_interval_seconds: 60
monitoring:
  metrics_port: 8000
  log_level: "INFO"
