name: Continuous Deployment

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy
        working-directory: /opt/butterflyguy
        run: |
          git pull origin main
          docker compose up --build -d
          docker image prune -f
