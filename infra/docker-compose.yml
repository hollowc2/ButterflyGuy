services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: butterfly_timescaledb
    environment:
      POSTGRES_DB: butterfly_guy
      POSTGRES_USER: butterfly
      POSTGRES_PASSWORD: butterfly_dev
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U butterfly -d butterfly_guy"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    container_name: butterfly_prometheus
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"

  grafana:
    image: grafana/grafana:latest
    container_name: butterfly_grafana
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: butterfly
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
      - timescaledb

  app_spx:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: butterfly_spx_app
    restart: unless-stopped
    env_file:
      - ../.env
    volumes:
      - ../tokens.json:/app/tokens.json
    environment:
      DATABASE__HOST: timescaledb
      DATABASE__PORT: 5432
      DATABASE__NAME: butterfly_guy
      DATABASE__USER: butterfly
      DATABASE__PASSWORD: butterfly_dev
    depends_on:
      timescaledb:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"  # Prometheus metrics

  collector_spx:
    profiles: [spx]
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: butterfly_spx_collector
    restart: unless-stopped
    command: ["python", "-m", "butterfly_guy.scripts.run_collector"]
    env_file:
      - ../.env
    volumes:
      - ../tokens.json:/app/tokens.json
    environment:
      DATABASE__HOST: timescaledb
      DATABASE__PORT: 5432
      DATABASE__NAME: butterfly_guy
      DATABASE__USER: butterfly
      DATABASE__PASSWORD: butterfly_dev
    depends_on:
      timescaledb:
        condition: service_healthy

  app_ndx:
    profiles: [ndx]
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: butterfly_ndx_app
    restart: unless-stopped
    command: ["python", "-m", "butterfly_guy.scripts.run_live", "--config", "config_ndx.yaml"]
    env_file:
      - ../.env
    volumes:
      - ../tokens.json:/app/tokens.json
      - ../config_ndx.yaml:/app/config_ndx.yaml
    environment:
      DATABASE__HOST: timescaledb
      DATABASE__PORT: 5432
      DATABASE__NAME: butterfly_guy
      DATABASE__USER: butterfly
      DATABASE__PASSWORD: butterfly_dev
    depends_on:
      timescaledb:
        condition: service_healthy
    ports:
      - "127.0.0.1:8001:8001"

  collector_ndx:
    profiles: [ndx]
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: butterfly_ndx_collector
    restart: unless-stopped
    command: ["python", "-m", "butterfly_guy.scripts.run_collector", "--config", "config_ndx.yaml"]
    env_file:
      - ../.env
    volumes:
      - ../tokens.json:/app/tokens.json
      - ../config_ndx.yaml:/app/config_ndx.yaml
    environment:
      DATABASE__HOST: timescaledb
      DATABASE__PORT: 5432
      DATABASE__NAME: butterfly_guy
      DATABASE__USER: butterfly
      DATABASE__PASSWORD: butterfly_dev
    depends_on:
      timescaledb:
        condition: service_healthy

volumes:
  timescale_data:
  prometheus_data:
  grafana_data:
