networks:
  monitoring_net:
    external: true

services:
  app_spx:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: butterfly_spx_app
    restart: unless-stopped
    env_file:
      - ../.env
    volumes:
      - ../tokens.json:/app/tokens.json
      - ../configs/config.yaml:/app/configs/config.yaml
      - ../data/chains:/app/data/chains
    environment:
      DATABASE__HOST: timescaledb
      DATABASE__PORT: 5432
      DATABASE__NAME: butterfly_guy
      DATABASE__USER: butterfly
      ALERTMANAGER_URL: http://alertmanager:9093
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - monitoring_net
    ports:
      - "127.0.0.1:8000:8000"  # Prometheus metrics

  app_ndx:
    profiles: [ndx]
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: butterfly_ndx_app
    restart: unless-stopped
    command: ["python", "-m", "butterfly_guy.scripts.run_live", "--config", "configs/config_ndx.yaml"]
    env_file:
      - ../.env
    volumes:
      - ../tokens.json:/app/tokens.json
      - ../configs/config_ndx.yaml:/app/configs/config_ndx.yaml
      - ../data/chains:/app/data/chains
    environment:
      DATABASE__HOST: timescaledb
      DATABASE__PORT: 5432
      DATABASE__NAME: butterfly_guy
      DATABASE__USER: butterfly
      ALERTMANAGER_URL: http://alertmanager:9093
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - monitoring_net
    ports:
      - "127.0.0.1:8001:8000"  # host:8001 → container:8000

  app_xsp:
    profiles: [xsp]
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: butterfly_xsp_app
    restart: unless-stopped
    command:
      - /bin/sh
      - -c
      - export LIVE_EXPECTED_SCHWAB_ACCOUNT_ID="$${SCHWAB_ACCOUNT_ID}"; exec python -m butterfly_guy.scripts.run_live --config configs/config_xsp.yaml
    env_file:
      - ../.env
    volumes:
      - ../tokens.json:/app/tokens.json
      - ../configs/config_xsp.yaml:/app/configs/config_xsp.yaml
      - ../data/chains:/app/data/chains
    environment:
      DATABASE__HOST: timescaledb
      DATABASE__PORT: 5432
      DATABASE__NAME: butterfly_guy
      DATABASE__USER: butterfly
      ALERTMANAGER_URL: http://alertmanager:9093
      LIVE_ACCOUNT_ALLOCATION: "20000"
      LIVE_MAX_ACCOUNT_DAILY_LOSS: "50"
      LIVE_XSP_CANARY: "false"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - monitoring_net
    ports:
      - "127.0.0.1:8003:8000"  # host:8003 → container:8000
