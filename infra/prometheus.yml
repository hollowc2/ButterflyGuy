global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "candidate-alerts.yml"

scrape_configs:
  - job_name: "butterfly_spx"
    static_configs:
      - targets: ["app_spx:8000"]
    metrics_path: /metrics

  - job_name: "butterfly_spx_candidate"
    static_configs:
      - targets: ["app_spx_candidate:8000"]
    metrics_path: /metrics

  - job_name: "spx_candidate_fleet"
    file_sd_configs:
      - files:
          - "generated/prometheus-candidates.json"
        refresh_interval: 30s
    metrics_path: /metrics

  - job_name: "butterfly_ndx"
    static_configs:
      - targets: ["app_ndx:8000"]
    metrics_path: /metrics

  - job_name: "butterfly_xsp"
    static_configs:
      - targets: ["app_xsp:8000"]
    metrics_path: /metrics

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
