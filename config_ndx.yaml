schwab:
  token_path: "tokens.json"
  max_token_age: 518400  # 6 days in seconds

strategy:
  underlying: "NDX"
  wing_widths: [25, 50, 75]   # NDX strikes are wider
  spot_range: 250              # NDX trades ~20000, wider scan range
  rr_min: 8.0
  max_cost_per_width:
    25: 2.00
    50: 4.00
    75: 6.00
entry:
  start_time: "07:00"  # PST
  end_time: "07:30"    # PST
  timezone: "America/Los_Angeles"
  use_vix_center: true
  center_tolerance: 100.0  # NDX moves in larger point increments
execution:
  price_ladder_step: 0.05
  price_ladder_steps: 4
  retry_interval_seconds: 20
  order_timeout_seconds: 300
  paper_trading: true
profit_management:
  regimes:
    morning:
      start_minutes_after_open: 0
      end_minutes_after_open: 120
      drawdown_threshold: 0.50
    late_morning:
      start_minutes_after_open: 120
      end_minutes_after_open: 240
      drawdown_threshold: 0.40
    afternoon:
      start_minutes_after_open: 240
      end_minutes_after_open: 390
      drawdown_threshold: 0.30
  exit_before_close_minutes: 5
risk:
  max_daily_loss: 500.0
  max_trades_per_day: 2
  max_position_size: 1
collector:
  snapshot_interval_seconds: 60
monitoring:
  metrics_port: 8001           # different port to avoid conflict with SPX app
  log_level: "INFO"
